<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spice House Restaurant</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
color:#333;
}

header{
background:#ff5722;
color:white;
text-align:center;
padding:60px 20px;
}

header h1{
font-size:42px;
}

header p{
margin:15px 0;
font-size:18px;
}

button{
padding:12px 25px;
border:none;
background:white;
color:#ff5722;
font-size:18px;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}

section{
padding:40px 20px;
text-align:center;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,.2);
}

.card h3{
margin-bottom:10px;
}

.price{
color:#ff5722;
font-size:22px;
font-weight:bold;
margin-top:10px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}
</style>

</head>

<body>

<header>
<h1>🍽 Spice House</h1>
<p>Fresh Food • Great Taste • Fast Service</p>
<button>Book a Table</button>
</header>

<section>

<h2>Our Popular Dishes</h2>

<div class="cards">

<div class="card">
<h3>🍕 Pizza</h3>
<p>Cheesy handmade pizza with fresh toppings.</p>
<p class="price">$12</p>
</div>

<div class="card">
<h3>🍔 Burger</h3>
<p>Juicy beef burger with crispy fries.</p>
<p class="price">$9</p>
</div>

<div class="card">
<h3>🍝 Pasta</h3>
<p>Creamy Italian pasta with parmesan.</p>
<p class="price">$11</p>
</div>

</div>

</section>

<footer>
<p>© 2026 Spice House Restaurant</p>
</footer>

</body>
</html>
