<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Barber</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
}

header{
text-align:center;
padding:70px 20px;
background:#1a1a1a;
}

h1{
font-size:42px;
}

header p{
margin:15px 0;
color:#ccc;
}

button{
padding:12px 25px;
background:gold;
border:none;
font-size:18px;
cursor:pointer;
border-radius:6px;
}

section{
padding:40px 20px;
text-align:center;
}

.card{
background:#222;
margin:15px auto;
padding:20px;
max-width:320px;
border-radius:10px;
}

.price{
color:gold;
font-size:22px;
margin-top:10px;
font-weight:bold;
}

footer{
background:#000;
padding:20px;
text-align:center;
margin-top:40px;
color:#aaa;
}
</style>
</head>

<body>

<header>
<h1>💈 Elite Barber</h1>
<p>Fresh Cuts. Sharp Style.</p>
<button>Book Now</button>
</header>

<section>
<h2>Our Services</h2>

<div class="card">
<h3>Classic Haircut</h3>
<p>Professional haircut for all styles.</p>
<p class="price">$10</p>
</div>

<div class="card">
<h3>Beard Trim</h3>
<p>Clean beard shaping and styling.</p>
<p class="price">$6</p>
</div>

<div class="card">
<h3>Hair + Beard</h3>
<p>Complete grooming package.</p>
<p class="price">$15</p>
</div>

</section>

<footer>
© 2026 Elite Barber
</footer>

</body>
</html>
