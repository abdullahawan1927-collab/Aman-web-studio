<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechZone</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0d1117;color:#fff;}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 8%;background:#161b22;}
nav ul{display:flex;gap:20px;list-style:none;}
nav a{text-decoration:none;color:#fff;}
.hero{height:90vh;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url("https://images.unsplash.com/photo-1519389950473-47ba0277781c") center/cover;display:flex;justify-content:center;align-items:center;text-align:center;}
.hero h1{font-size:55px;}
.hero p{margin:20px 0;font-size:20px;}
.btn{background:#00bcd4;color:#fff;padding:14px 30px;text-decoration:none;border-radius:6px;}
section{padding:70px 8%;}
.title{text-align:center;font-size:36px;margin-bottom:40px;}
.cards{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;}
.card{background:#161b22;width:280px;border-radius:10px;overflow:hidden;}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3,.card p{padding:10px 15px;}
.price{color:#00e5ff;font-size:22px;font-weight:bold;}
footer{background:#161b22;text-align:center;padding:25px;}
</style>
</head>

<body>

<nav>
<h2>💻 TechZone</h2>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Products</a></li>
<li><a href="#">Deals</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="hero">
<div>
<h1>Latest Tech. Best Prices.</h1>
<p>Shop laptops, phones and gaming gear.</p>
<a href="#" class="btn">Shop Now</a>
</div>
</div>

<section>
<h2 class="title">Featured Products</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">
<h3>Smartphone</h3>
<p class="price">$699</p>
<p>128GB • OLED Display</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853">
<h3>Laptop</h3>
<p class="price">$999</p>
<p>16GB RAM • SSD</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606144042614-b2417e99c4e3">
<h3>Gaming Headset</h3>
<p class="price">$89</p>
<p>Surround Sound</p>
</div>

</div>

</section>

<footer>
<p>© 2026 TechZone Store</p>
</footer>

</body>
</html>
